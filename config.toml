[server]
host = "0.0.0.0"
port = 3000

[database]
path = "/data/rustpulse.db"
max_connections = 10

[scheduler]
max_concurrent_checks = 100
check_batch_interval_ms = 1000
heartbeat_check_interval_secs = 30

[monitor]
default_timeout_secs = 30
default_interval_secs = 60
history_retention_count = 20

[logging]
level = "info"