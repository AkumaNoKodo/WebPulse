<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RustPulse{% endblock %}</title>
    <link href="/output.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body class="bg-black text-green-400 font-mono min-h-screen">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-sm border-b border-green-900 px-6 py-4">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <span class="text-2xl animate-pulse">◉</span>
                <h1 class="text-xl font-bold tracking-wider">RUSTPULSE</h1>
                <span class="text-green-700 text-sm">// SYSTEM ONLINE</span>
            </div>
            <button 
                hx-get="/monitors/new"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="bg-green-900/50 hover:bg-green-900 border border-green-700 px-4 py-2 rounded transition-all flex items-center gap-2">
                <span class="text-lg">+</span>
                <span>NEW MONITOR</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 px-6 pb-6 max-w-7xl mx-auto relative z-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    {% block scripts %}{% endblock %}
</body>
</html>
