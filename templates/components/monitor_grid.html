{% if monitors.is_empty() %}
<div class="col-span-full text-center py-16 border border-green-900 rounded-lg bg-green-950/30">
    <div class="text-6xl mb-4">◇</div>
    <div class="text-xl font-bold mb-2">NO MONITORS ACTIVE</div>
    <div class="text-green-700 mb-6">Initialize your first monitoring endpoint</div>
    <button 
        hx-get="/monitors/new"
        hx-target="#modal-container"
        hx-swap="innerHTML"
        class="bg-green-900/30 hover:bg-green-900/50 border border-green-700 px-6 py-3 rounded transition-all">
        + ADD MONITOR
    </button>
</div>
{% else %}
{% for monitor in monitors %}
    {% include "components/monitor_card.html" %}
{% endfor %}
{% endif %}
