<div class="bg-black/80 border border-green-900 rounded-lg p-5 hover:border-green-600 transition-all">
    <h3 class="text-sm font-bold text-green-400 mb-3 tracking-wider">HISTORY (last 100 checks)</h3>
    <div class="space-y-2 max-h-96 overflow-y-auto">
        {% for h in histories %}
        <div class="flex justify-between items-center px-3 py-2 rounded bg-black/50">
            <span class="text-xs text-green-600 w-20">{{ h.status|upper }}</span>
            <span class="text-xs text-green-400 w-32">{% if let Some(ms) = h.response_time_ms %}{{ ms }}ms{% else %}N/A{% endif %}</span>
            <span class="text-xs text-green-400 w-48 truncate" title="{{ h.error_message.clone().unwrap_or_default() }}">{{ h.error_message.clone().unwrap_or_default() }}</span>
            <span class="text-xs text-green-700 w-32 text-right">{% if let Some(t) = h.checked_at.as_deref() %}{{ t }}{% endif %}</span>
        </div>
        {% endfor %}
    </div>
</div>
