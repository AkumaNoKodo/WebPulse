{% extends "base.html" %}

{% block title %}RustPulse - Monitor Dashboard{% endblock %}

{% block content %}
<!-- Stats Grid with HTMX -->
<div data-poll
     hx-get="/partial/stats"
     hx-trigger="load, every 10s"
     hx-swap="innerHTML">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-green-950/50 border border-green-900 rounded-lg p-4 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-16 h-16 bg-green-900/30 rounded-bl-full"></div>
            <div class="text-green-700 text-xs mb-2">TOTAL MONITORS</div>
            <div class="text-3xl font-bold">{{ total }}</div>
            <div class="mt-2 h-1 bg-green-900/50 rounded-full overflow-hidden">
                <div class="h-full w-1/3 bg-green-500 animate-pulse"></div>
            </div>
        </div>
        <div class="bg-green-950/50 border border-green-900 rounded-lg p-4 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-16 h-16 bg-green-900/30 rounded-bl-full"></div>
            <div class="text-green-700 text-xs mb-2">ONLINE</div>
            <div class="text-3xl font-bold">{{ online }}</div>
            <div class="mt-2 h-1 bg-green-900/50 rounded-full overflow-hidden">
                <div class="h-full w-1/3 bg-green-500 animate-pulse"></div>
            </div>
        </div>
        <div class="bg-green-950/50 border border-green-900 rounded-lg p-4 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-16 h-16 bg-green-900/30 rounded-bl-full"></div>
            <div class="text-green-700 text-xs mb-2">OFFLINE</div>
            <div class="text-3xl font-bold">{{ offline }}</div>
            <div class="mt-2 h-1 bg-green-900/50 rounded-full overflow-hidden">
                <div class="h-full w-1/3 bg-green-500 animate-pulse"></div>
            </div>
        </div>
        <div class="bg-green-950/50 border border-green-900 rounded-lg p-4 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-16 h-16 bg-green-900/30 rounded-bl-full"></div>
            <div class="text-green-700 text-xs mb-2">UNKNOWN</div>
            <div class="text-3xl font-bold">{{ pending }}</div>
            <div class="mt-2 h-1 bg-green-900/50 rounded-full overflow-hidden">
                <div class="h-full w-1/3 bg-green-500 animate-pulse"></div>
            </div>
        </div>
    </div>
</div>

<!-- Section Header -->
<div class="flex justify-between items-center mb-6">
    <h2 class="text-lg font-bold tracking-wider">◈ MONITORING GRID</h2>
    <span class="text-green-700 text-xs animate-pulse">LIVE FEED ACTIVE</span>
</div>

<!-- Monitors Grid with HTMX -->
<div id="monitors-grid"
     data-poll
     class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"
     hx-get="/partial/monitors"
     hx-trigger="load, every 10s"
     hx-swap="innerHTML">
    {% include "components/monitor_grid.html" %}
</div>
{% endblock %}
